<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Street Sign Database Map</title>
    
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <script src="https://cdn.tailwindcss.com"></script>

    <style>
        body, html {
            margin: 0;
            padding: 0;
            height: 100vh;
            width: 100vw;
            overflow: hidden;
        }
        #map {
            height: 100vh;
            width: 100vw;
            background: #aad3df;
        }
        .custom-marker-container {
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .custom-marker-img {
            border: 2px solid white;
            border-radius: 4px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.4);
            background-color: white;
            width: auto;
            display: block;
            transition: height 0.3s ease-out, transform 0.2s;
        }
        .custom-marker-img:hover {
            transform: scale(1.2);
            z-index: 1000;
        }
        .leaflet-popup-content img {
            max-width: 240px;
            border-radius: 4px;
            margin-top: 8px;
            display: block;
        }
        .leaflet-div-icon {
            background: transparent !important;
            border: none !important;
        }
    </style>
</head>
<body>

    <div id="map"></div>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>

    <script>
        const JSON_URL = 'https://alboxer2000.github.io/StreetSignDatabase/database.json';
        let map;

        function getIconHeight(zoom) {
            const minSize = 10;
            const maxSize = 45;
            return Math.max(minSize, Math.min(maxSize, zoom * 3));
        }

        async function loadSignData() {
            try {
                const response = await fetch(JSON_URL);
                const data = await response.json();
                const markers = [];

                data.forEach((sign) => {
                    const lat = parseFloat(sign.latitude);
                    const lng = parseFloat(sign.longitude);
                    const imageUrl = sign.image;

                    if (!isNaN(lat) && !isNaN(lng) && imageUrl) {
                        const currentSize = getIconHeight(map.getZoom());
                        
                        const signIcon = L.divIcon({
                            html: `<div class="custom-marker-container">
                                     <img src="${imageUrl}" class="custom-marker-img" style="height: ${currentSize}px;">
                                   </div>`,
                            iconSize: [60, 60],
                            iconAnchor: [30, 30],
                            popupAnchor: [0, -15]
                        });

                        const marker = L.marker([lat, lng], { icon: signIcon })
                            .bindPopup(`
                                <div class="font-sans p-1">
                                    <h3 class="font-bold text-blue-800">${sign.name || 'Street Sign'}</h3>
                                    <img src="${imageUrl}" style="width:100%; border-radius:4px;">
                                </div>
                            `);
                        
                        marker.addTo(map);
                        markers.push([lat, lng]);
                    }
                });

                if (markers.length > 0) {
                    const bounds = L.latLngBounds(markers);
                    map.fitBounds(bounds, { padding: [50, 50] });
                    map.invalidateSize(); 
                }

            } catch (error) {
                console.error(error);
            }
        }

        function initMap() {
            map = L.map('map', {
                zoomControl: true,
                attributionControl: false
            }).setView([20, 0], 2);

            L.tileLayer('https://tile.openstreetmap.org/{z}/{x}/{y}.png', {
                maxZoom: 19
            }).addTo(map);

            map.on('zoomend', () => {
                const newHeight = getIconHeight(map.getZoom());
                document.querySelectorAll('.custom-marker-img').forEach(img => {
                    img.style.height = newHeight + 'px';
                });
            });

            setTimeout(() => {
                map.invalidateSize(true);
                loadSignData();
            }, 300);
        }

        window.onload = initMap;
    </script>
</body>
</html>
